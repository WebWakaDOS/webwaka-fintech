name = "webwaka-fintech"
main = "src/worker.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# ─── Local Development Bindings (Miniflare / wrangler dev) ───────────────────
[[d1_databases]]
binding = "DB"
database_name = "webwaka-fintech-db-local"
database_id = "00000000-0000-0000-0000-000000000001"

[[kv_namespaces]]
binding = "SESSIONS_KV"
id = "00000000000000000000000000000001"

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "00000000000000000000000000000002"

[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "webwaka-fintech-docs-local"

[vars]
ENVIRONMENT = "local"
JWT_SECRET = "local-dev-secret-change-in-production"
PAYSTACK_SECRET_KEY = "sk_test_placeholder"
OPENROUTER_API_KEY = "placeholder"
TERMII_API_KEY = "placeholder"
NIBSS_BASE_URL = "https://placeholder.nibss.local"
NIBSS_CLIENT_ID = "placeholder"
NIBSS_CLIENT_SECRET = "placeholder"
NIBSS_SOURCE_BANK_CODE = "000001"
NIBSS_SOURCE_ACCOUNT_NUMBER = "0000000000"
# Optional integrations — leave blank for local dev
# AI_PLATFORM_URL = ""
# INTER_SERVICE_SECRET = ""
# VTPASS_API_KEY = ""
# VTPASS_BASE_URL = ""
# USSD_GATEWAY_URL = ""
# USSD_GATEWAY_SECRET = ""
# CARD_ISSUER_KEY = ""
# CARD_ISSUER_URL = ""
# CRYPTO_EXCHANGE_URL = ""
# CRYPTO_EXCHANGE_KEY = ""

# ─── Staging Environment ──────────────────────────────────────────────────────
# IMPORTANT: webwaka-fintech requires its OWN dedicated D1 database.
# Do NOT share the institutional DB (ee93377c) — fintech has separate table schemas
# for banking, wallets, KYC, lending, crypto, insurance, etc.
# Create a fintech staging DB:
#   wrangler d1 create webwaka-fintech-db-staging
# Then replace the REPLACE_WITH_... placeholder with the real ID.
[env.staging]
name = "webwaka-fintech-staging"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "webwaka-fintech-db-staging"
database_id = "REPLACE_WITH_FINTECH_STAGING_DB_ID"

[[env.staging.kv_namespaces]]
binding = "SESSIONS_KV"
id = "db725eade5d04c228c2bad04a2ff4f0f"

[[env.staging.kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "f37ce1287e654d72b8030a010d10313f"

[[env.staging.r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "webwaka-fintech-docs-staging"

[env.staging.vars]
ENVIRONMENT = "staging"

# ─── Production Environment ───────────────────────────────────────────────────
# IMPORTANT: Create a dedicated fintech production D1 DB:
#   wrangler d1 create webwaka-fintech-db-prod
# Then replace the REPLACE_WITH_... placeholder with the real ID.
[env.production]
name = "webwaka-fintech-production"

[[env.production.d1_databases]]
binding = "DB"
database_name = "webwaka-fintech-db-prod"
database_id = "REPLACE_WITH_FINTECH_PROD_DB_ID"

[[env.production.kv_namespaces]]
binding = "SESSIONS_KV"
id = "c83a742fe73e4abcb5be4615d8b676ba"

[[env.production.kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "05743085cdc44abaa8483af9f27e1ee6"

[[env.production.r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "webwaka-fintech-docs-prod"

[env.production.vars]
ENVIRONMENT = "production"

# ─── Secrets (set via: wrangler secret put <KEY> --env <staging|production>) ──
# JWT_SECRET
# PAYSTACK_SECRET_KEY
# OPENROUTER_API_KEY
# TERMII_API_KEY
#
# ─── NIBSS NIP Secrets ────────────────────────────────────────────────────────
# NIBSS_BASE_URL              — Bank partner NIP gateway base URL
# NIBSS_CLIENT_ID             — Bank partner OAuth2 client ID
# NIBSS_CLIENT_SECRET         — Bank partner OAuth2 client secret (also HMAC webhook key)
# NIBSS_SOURCE_BANK_CODE      — CBN bank code of the sending institution (e.g. "000001")
# NIBSS_SOURCE_ACCOUNT_NUMBER — Clearing account number held at the bank partner
#
# ─── Enhancement Secrets (optional) ──────────────────────────────────────────
# AI_PLATFORM_URL             — webwaka-ai-platform URL (for AI credit scoring)
# INTER_SERVICE_SECRET        — Inter-service secret for AI platform auth
# VTPASS_API_KEY              — VTPass API key for bill payments
# VTPASS_BASE_URL             — VTPass base URL
# USSD_GATEWAY_URL            — USSD gateway URL
# USSD_GATEWAY_SECRET         — USSD gateway secret
# CARD_ISSUER_KEY             — Virtual card issuer API key (Paystack, etc.)
# CARD_ISSUER_URL             — Virtual card issuer base URL
# CRYPTO_EXCHANGE_URL         — Licensed crypto exchange partner URL
# CRYPTO_EXCHANGE_KEY         — Crypto exchange API key
#
# ─── Event Bus Secrets ────────────────────────────────────────────────────────
# EVENT_BUS_URL               — WebWaka Event Bus URL (optional; events skipped if absent)
# EVENT_BUS_SECRET            — Shared secret sent as X-Bus-Secret header (optional)
