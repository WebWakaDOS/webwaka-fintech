name: Bootstrap D1 Databases

on:
  workflow_dispatch:
    inputs:
      staging_db_id:
        description: 'Existing D1 DB ID to use for STAGING (leave blank to auto-create)'
        required: false
        default: ''
      prod_db_id:
        description: 'Existing D1 DB ID to use for PRODUCTION (leave blank to auto-create)'
        required: false
        default: ''
      list_only:
        description: 'Set to "true" to only list existing D1 DBs without creating anything'
        required: false
        default: 'false'

jobs:
  bootstrap-d1:
    name: Create D1 Databases & Update wrangler.toml
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install wrangler
        run: npm install -g wrangler

      - name: List all existing D1 databases
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "=== All D1 databases on this Cloudflare account ==="
          wrangler d1 list 2>&1
          echo ""
          echo "Note: Free plan limit is 10 databases."

      - name: Resolve staging DB ID
        if: ${{ github.event.inputs.list_only != 'true' }}
        id: resolve-staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          GIVEN_ID="${{ github.event.inputs.staging_db_id }}"

          if [ -n "$GIVEN_ID" ]; then
            echo "Using provided staging DB ID: $GIVEN_ID"
            echo "STAGING_DB_ID=$GIVEN_ID" >> $GITHUB_OUTPUT
          else
            # Try to create; if at limit, try to find existing fintech staging DB
            OUTPUT=$(wrangler d1 create webwaka-fintech-db-staging 2>&1 || true)
            echo "$OUTPUT"

            NEW_ID=$(echo "$OUTPUT" | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1)

            if [ -z "$NEW_ID" ]; then
              # DB may already exist — look it up in the list
              LIST_OUTPUT=$(wrangler d1 list 2>&1)
              NEW_ID=$(echo "$LIST_OUTPUT" | grep "webwaka-fintech-db-staging" | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1)
            fi

            if [ -z "$NEW_ID" ]; then
              echo ""
              echo "❌ Cannot auto-create staging DB — account is at the D1 database limit."
              echo ""
              echo "Options:"
              echo "  1. Delete an unused D1 database from the Cloudflare dashboard"
              echo "     (https://dash.cloudflare.com → Workers & Pages → D1)"
              echo "  2. Re-run this workflow with 'staging_db_id' set to an existing DB ID"
              echo "     to repurpose an existing DB for fintech staging."
              echo ""
              exit 1
            fi

            echo "STAGING_DB_ID=$NEW_ID" >> $GITHUB_OUTPUT
            echo "✅ Staging DB ID: $NEW_ID"
          fi

      - name: Resolve production DB ID
        if: ${{ github.event.inputs.list_only != 'true' }}
        id: resolve-prod
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          GIVEN_ID="${{ github.event.inputs.prod_db_id }}"

          if [ -n "$GIVEN_ID" ]; then
            echo "Using provided production DB ID: $GIVEN_ID"
            echo "PROD_DB_ID=$GIVEN_ID" >> $GITHUB_OUTPUT
          else
            OUTPUT=$(wrangler d1 create webwaka-fintech-db-prod 2>&1 || true)
            echo "$OUTPUT"

            NEW_ID=$(echo "$OUTPUT" | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1)

            if [ -z "$NEW_ID" ]; then
              LIST_OUTPUT=$(wrangler d1 list 2>&1)
              NEW_ID=$(echo "$LIST_OUTPUT" | grep "webwaka-fintech-db-prod" | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1)
            fi

            if [ -z "$NEW_ID" ]; then
              echo ""
              echo "❌ Cannot auto-create production DB — account is at the D1 database limit."
              echo ""
              echo "Options:"
              echo "  1. Delete an unused D1 database from the Cloudflare dashboard"
              echo "     (https://dash.cloudflare.com → Workers & Pages → D1)"
              echo "  2. Re-run this workflow with 'prod_db_id' set to an existing DB ID"
              echo "     to repurpose an existing DB for fintech production."
              echo ""
              exit 1
            fi

            echo "PROD_DB_ID=$NEW_ID" >> $GITHUB_OUTPUT
            echo "✅ Production DB ID: $NEW_ID"
          fi

      - name: Patch wrangler.toml with real DB IDs
        if: ${{ github.event.inputs.list_only != 'true' }}
        run: |
          STAGING_ID="${{ steps.resolve-staging.outputs.STAGING_DB_ID }}"
          PROD_ID="${{ steps.resolve-prod.outputs.PROD_DB_ID }}"

          echo "Patching staging DB ID: $STAGING_ID"
          echo "Patching prod DB ID: $PROD_ID"

          sed -i "s/REPLACE_WITH_FINTECH_STAGING_DB_ID/$STAGING_ID/g" wrangler.toml
          sed -i "s/REPLACE_WITH_FINTECH_PROD_DB_ID/$PROD_ID/g" wrangler.toml

          echo "--- Patched wrangler.toml D1 entries ---"
          grep "database_id" wrangler.toml

      - name: Run DB migrations on staging
        if: ${{ github.event.inputs.list_only != 'true' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          STAGING_DB_NAME="webwaka-fintech-db-staging"
          STAGING_ID="${{ steps.resolve-staging.outputs.STAGING_DB_ID }}"

          # If we're using a provided ID (repurposed DB), use the ID directly
          if [ -n "${{ github.event.inputs.staging_db_id }}" ]; then
            for f in migrations/*.sql; do
              echo "Applying $f to staging (by ID: $STAGING_ID)..."
              wrangler d1 execute "$STAGING_ID" --remote --file "$f" 2>&1 || echo "Migration $f note: $?"
            done
          else
            for f in migrations/*.sql; do
              echo "Applying $f to staging..."
              wrangler d1 execute "$STAGING_DB_NAME" --remote --file "$f" 2>&1 || echo "Migration $f note: $?"
            done
          fi
          echo "✅ Staging migrations complete"

      - name: Run DB migrations on production
        if: ${{ github.event.inputs.list_only != 'true' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          PROD_DB_NAME="webwaka-fintech-db-prod"
          PROD_ID="${{ steps.resolve-prod.outputs.PROD_DB_ID }}"

          if [ -n "${{ github.event.inputs.prod_db_id }}" ]; then
            for f in migrations/*.sql; do
              echo "Applying $f to production (by ID: $PROD_ID)..."
              wrangler d1 execute "$PROD_ID" --remote --file "$f" 2>&1 || echo "Migration $f note: $?"
            done
          else
            for f in migrations/*.sql; do
              echo "Applying $f to production..."
              wrangler d1 execute "$PROD_DB_NAME" --remote --file "$f" 2>&1 || echo "Migration $f note: $?"
            done
          fi
          echo "✅ Production migrations complete"

      - name: Commit patched wrangler.toml
        if: ${{ github.event.inputs.list_only != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wrangler.toml
          git diff --staged --quiet && echo "No changes to commit (IDs already set)" || \
            git commit -m "chore(infra): set real D1 database IDs for fintech staging and production

          Staging DB:    ${{ steps.resolve-staging.outputs.STAGING_DB_ID }}
          Production DB: ${{ steps.resolve-prod.outputs.PROD_DB_ID }}

          Set via bootstrap-d1 workflow. Migrations applied." && git push
          echo "✅ Done"
